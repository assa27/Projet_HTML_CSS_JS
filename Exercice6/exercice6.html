<!DOCTYPE html>
<html>
    <head>
    <link rel="stylesheet" href="exercice6.css">
    </head>
    <body>
        <h1>Gestion des taches</h1><br>
        
        <h2>Utilisateurs</h2><br>
        <form id="userForm">
            <label>Nom et prenom des utilisateurs</label>
            <input type="text" id="nom" required>
            <input type="text" id="prenom">
            <!-- <button -->
            <input type="submit" value="Ajouter un utilisateur">
        </form ><br>
        <table>
            <thead>
                <th>Nom</th>
                <th>Prenom</th>
            </thead>
            <tbody id="tbody">
            </tbody>
        </table>

        <h2>Taches</h2><br>
        <form id="taskForm">
            <label >Nom des tâches</label>
            <input type="text" id="taskTitle" required>
            <button type="submit">Ajouter une tache</button>
        </form><br>
        <ul id="taskList">Liste des taches</ul>
        
        
    </body>
    <script src="exercice6.js"></script>
</html>
